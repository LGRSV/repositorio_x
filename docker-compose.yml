services:
  repository_x:
    build: .
    container_name: repository_x
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMIN_UPLOAD_PASSWORD: ${ADMIN_UPLOAD_PASSWORD}
      PORT: 8080
      DATA_DIR: /app/data
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-12}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      # Preencha com seu domínio público para os links saírem corretos atrás de proxy.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # Use true quando estiver atrás de HTTPS (Caddy, Nginx, Traefik etc.).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - ./data:/app/data
